[options]
admin_passwd = admin
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = postgres
data_dir = /var/lib/odoo
logfile = /var/log/odoo/odoo.log
log_level = info

# Workers configuration
workers = 2
max_cron_threads = 1
limit_request_cpu = 60
limit_request_real = 120
limit_time_cpu = 60
limit_time_real = 120

# External API settings
external_api_url = http://localhost:8069
external_api_key = gold-tier-api-key-2026

# Security
list_db = True
without_demo = all
